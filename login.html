<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Accesso - Smart Home Clima</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Roboto', sans-serif; 
            background-color: #f5f6f8; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-box { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            width: 80%; 
            max-width: 350px; 
            text-align: center; 
        }
        h2 { margin-top: 0; color: #333; }
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px; 
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            cursor: pointer; 
            margin-top: 15px; 
            font-weight: 500; 
        }
        #error-msg { 
            color: #dc3545; 
            font-size: 13px; 
            margin-top: 15px; 
            display: none; 
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Casa Tua 🏠</h2>
        <p style="color: #888; font-size: 14px; margin-bottom: 25px;">Accedi per gestire il clima</p>
        
        <input type="email" id="email" placeholder="La tua email">
        <input type="password" id="password" placeholder="La tua password">
        
        <button onclick="accedi()">Entra</button>
        <div id="error-msg">Email o password errate. Riprova.</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // Le tue chiavi Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDicCAPn-jBqZzX5SWvxFkTyjeO5VItxUo",
            authDomain: "smartclima-casa.firebaseapp.com",
            projectId: "smartclima-casa",
            storageBucket: "smartclima-casa.firebasestorage.app",
            messagingSenderId: "1075389846823",
            appId: "1:1075389846823:web:02fbdc2d55fdbddde84502"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.accedi = function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const btn = document.querySelector('button');
            
            errorMsg.style.display = 'none';
            btn.innerText = "Accesso in corso...";

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // Se la password è giusta, ti manda alla Home!
                    window.location.href = "index.html";
                })
                .catch((error) => {
                    errorMsg.style.display = 'block';
                    btn.innerText = "Entra";
                    console.error(error.message);
                });
        };
    </script>
</body>
</html>
