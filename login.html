<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Smart Home Clima</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#061b30">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Smart Clima">
    <link rel="apple-touch-icon" href="logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-color: #f0f5fa; 
            --text-main: #1c1c1e; 
            --text-muted: #8e8e93; 
            --accent-color: #007aff; 
            --error-color: #ff3b30;
        }
        
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Roboto', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            position: relative;
        }

        /* SFERE FLUTTUANTI (SFONDO MODERNO) */
        .blob { position: absolute; border-radius: 50%; filter: blur(60px); z-index: 0; opacity: 0.6; }
        .blob-1 { top: 10%; left: -10%; width: 300px; height: 300px; background: #007aff; animation: float 6s ease-in-out infinite; }
        .blob-2 { bottom: 10%; right: -10%; width: 280px; height: 280px; background: #34c759; animation: float 8s ease-in-out infinite reverse; }
        .blob-3 { top: -20%; right: 10%; width: 200px; height: 200px; background: #5ac8fa; animation: float 10s ease-in-out infinite 2s; }
        
        @keyframes float { 
            0% { transform: translateY(0) scale(1); } 
            50% { transform: translateY(30px) scale(1.05); } 
            100% { transform: translateY(0) scale(1); } 
        }

        /* PANNELLO DI VETRO (GLASSMORPHISM) */
        .login-glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 36px;
            padding: 45px 30px;
            width: 85%;
            max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* CONTENITORE LOGO */
        .icon-container { 
            width: 80px; 
            height: 80px; 
            border-radius: 20px; 
            background: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 20px; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); 
            padding: 10px; 
            box-sizing: border-box; 
        }
        .icon-container img { width: 100%; height: 100%; object-fit: contain; }

        h1 { margin: 0; font-size: 26px; font-weight: 900; letter-spacing: -0.5px; color: var(--text-main); }
        p { margin: 5px 0 30px 0; font-size: 14px; font-weight: 500; color: var(--text-muted); text-align: center;}

        /* CAMPI DI TESTO IOS STYLE */
        .input-group { width: 100%; position: relative; margin-bottom: 16px; }
        .input-group i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 16px; }
        .input-group input { 
            width: 100%; 
            background: rgba(255, 255, 255, 0.8); 
            border: 1px solid rgba(0,0,0,0.05); 
            padding: 16px 16px 16px 45px; 
            border-radius: 18px; 
            font-size: 15px; 
            font-weight: 500; 
            color: var(--text-main); 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.3s;
            font-family: 'Roboto', sans-serif;
        }
        .input-group input:focus { border-color: var(--accent-color); background: #fff; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.1); }
        .input-group input::placeholder { color: #a9a9b0; font-weight: 400; }

        .error-msg { color: var(--error-color); font-size: 13px; font-weight: 600; margin-bottom: 15px; text-align: center; min-height: 15px; }

        /* PULSANTE ACCEDI */
        .login-btn { 
            width: 100%; 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 18px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.3); 
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Roboto', sans-serif;
        }
        .login-btn:active { transform: scale(0.95); box-shadow: 0 4px 10px rgba(0, 122, 255, 0.2); }
        .login-btn:disabled { background: #a9a9b0; cursor: not-allowed; box-shadow: none; }

    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="login-glass-panel">
        <div class="icon-container">
            <img src="logo.png" alt="VA Logo">
        </div>
        <h1>Casa Tua</h1>
        <p>Accedi alla tua Smart Home</p>
        
        <form id="login-form" style="width: 100%;">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Email di accesso" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            
            <div id="error-msg" class="error-msg"></div>
            
            <button type="submit" class="login-btn" id="login-btn">Accedi</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDicCAPn-jBqZzX5SWvxFkTyjeO5VItxUo", 
            authDomain: "smartclima-casa.firebaseapp.com", 
            projectId: "smartclima-casa", 
            storageBucket: "smartclima-casa.firebasestorage.app", 
            messagingSenderId: "1075389846823", 
            appId: "1:1075389846823:web:02fbdc2d55fdbddde84502" 
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Se sei già loggato, ti butta direttamente dentro l'App
        onAuthStateChanged(auth, (user) => { 
            if (user) { window.location.href = "index.html"; } 
        });

        const form = document.getElementById('login-form');
        const btn = document.getElementById('login-btn');
        const errorMsg = document.getElementById('error-msg');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            btn.innerText = "Accesso in corso...";
            btn.disabled = true;
            errorMsg.innerText = "";

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // Accesso Riuscito! Va alla Home
                    window.location.href = "index.html";
                })
                .catch((error) => {
                    // Errore
                    errorMsg.innerText = "Credenziali non valide. Riprova.";
                    btn.innerText = "Accedi";
                    btn.disabled = false;
                });
        });
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(err => console.warn('Errore SW', err)); });
        }
    </script>
</body>
</html>
