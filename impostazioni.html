<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Impostazioni - Smart Home Clima</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-color: #f0f5fa; 
            --card-bg: #ffffff; 
            --text-main: #1c1c1e; 
            --text-muted: #8e8e93; 
            --accent-color: #007aff; 
            --accent-bg: #e5f1ff;
        }
        
        body { margin: 0; padding: 0; font-family: 'Roboto', sans-serif; background-color: var(--bg-color); color: var(--text-main); padding-bottom: 110px; overflow-x: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: flex-start; padding: 30px 24px 20px 24px; }
        .greeting-box { display: flex; flex-direction: column; gap: 4px; }
        .greeting { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; margin: 0; }
        .subtitle { font-size: 14px; font-weight: 500; color: var(--text-muted); margin: 0; }

        /* LISTA IMPOSTAZIONI */
        .settings-section { padding: 0 24px; margin-top: 10px; }
        .settings-title { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.5px; margin-left: 5px;}
        
        .settings-card { background: var(--card-bg); border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); overflow: hidden; border: 1px solid rgba(0,0,0,0.02); }
        
        .settings-item { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; cursor: pointer; transition: 0.2s; background: var(--card-bg); border-bottom: 1px solid #f0f0f5; }
        .settings-item:last-child { border-bottom: none; }
        .settings-item:active { background: #f8f9fa; }
        
        .item-left { display: flex; align-items: center; gap: 15px; }
        .item-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; background: #f0f5fa; color: var(--text-muted); }
        .item-text h4 { margin: 0; font-size: 16px; font-weight: 600; color: var(--text-main); }
        .item-text p { margin: 3px 0 0 0; font-size: 12px; color: var(--text-muted); }
        
        .item-right { color: #c7c7cc; font-size: 16px; }

        /* FLOATING NAV */
        .floating-nav { position: fixed; bottom: 25px; left: 24px; right: 24px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-radius: 30px; display: flex; justify-content: space-around; align-items: center; padding: 12px 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); border: 1px solid rgba(255,255,255,0.4); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); font-size: 10px; font-weight: 700; text-decoration: none; padding: 8px 15px; border-radius: 20px; transition: 0.3s; }
        .nav-item i { font-size: 22px; }
        .nav-item.active { color: var(--accent-color); background: var(--accent-bg); }
    </style>
</head>
<body>

    <div class="header">
        <div class="greeting-box">
            <h1 class="greeting">Impostazioni</h1>
            <p class="subtitle">Gestione Sistema e Dispositivi</p>
        </div>
    </div>

    <div class="settings-section">
        <div class="settings-title">Dispositivi (In arrivo)</div>
        <div class="settings-card">
            
            <div class="settings-item">
                <div class="item-left">
                    <div class="item-icon" style="background: var(--accent-bg); color: var(--accent-color);"><i class="fas fa-wifi"></i></div>
                    <div class="item-text">
                        <h4>Rete Wi-Fi</h4>
                        <p>Modifica la rete di collegamento</p>
                    </div>
                </div>
                <div class="item-right"><i class="fas fa-chevron-right"></i></div>
            </div>

            <div class="settings-item">
                <div class="item-left">
                    <div class="item-icon"><i class="fas fa-plus"></i></div>
                    <div class="item-text">
                        <h4>Aggiungi Condizionatore</h4>
                        <p>Configura un nuovo Wemos D1</p>
                    </div>
                </div>
                <div class="item-right"><i class="fas fa-chevron-right"></i></div>
            </div>

        </div>
    </div>

    <div class="floating-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="impostazioni.html" class="nav-item active"><i class="fas fa-cog"></i><span>Impostazioni</span></a>
        <a href="#" class="nav-item" onclick="esci()"><i class="fas fa-sign-out-alt"></i><span>Esci</span></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        
        const firebaseConfig = { apiKey: "AIzaSyDicCAPn-jBqZzX5SWvxFkTyjeO5VItxUo", authDomain: "smartclima-casa.firebaseapp.com", projectId: "smartclima-casa", storageBucket: "smartclima-casa.firebasestorage.app", messagingSenderId: "1075389846823", appId: "1:1075389846823:web:02fbdc2d55fdbddde84502" };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "login.html"; });
        window.esci = function() { signOut(auth).then(() => { window.location.href = "login.html"; }); };
    </script>
</body>
</html>
