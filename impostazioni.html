<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Impostazioni - Smart Clima</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-color: #f0f5fa; 
            --card-bg: #ffffff; 
            --text-main: #1c1c1e; 
            --text-muted: #8e8e93; 
            --accent-color: #007aff; 
            --accent-bg: #e5f1ff; 
        }
        body { margin: 0; padding: 0; font-family: 'Roboto', sans-serif; background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; user-select: none; -webkit-user-select: none; min-height: 100vh; display: flex; flex-direction: column;}
        
        /* HEADER SFUMATO IDENTICO ALLA HOME */
        .top-hero { 
            background: linear-gradient(180deg, #061b30 0%, #0056b3 60%, var(--bg-color) 100%); 
            padding: 35px 24px 20px 24px; 
            color: white; 
        }
        
        .hero-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hero-brand { display: flex; align-items: center; gap: 12px; }
        .brand-title { color: #ffffff; font-size: 14px; font-weight: 800; line-height: 1.2; letter-spacing: 0.3px; }
        .hero-logo-container { background-color: white; border-radius: 14px; padding: 8px; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(0,0,0,0.2); width: 60px; height: 60px; flex-shrink: 0;}
        .hero-logo { width: 100%; height: 100%; object-fit: contain; }

        .hero-user { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-top: 2px;}
        .profile-btn { width: 50px; height: 50px; border-radius: 25px; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--accent-color); box-shadow: 0 4px 15px rgba(0,0,0,0.15); overflow: hidden; border: 2px solid white; flex-shrink: 0; }
        .profile-btn img { width: 100%; height: 100%; object-fit: cover; }
        .hero-greeting { font-size: 10px; font-weight: 600; color: white; margin: 0; text-align: center; }

        /* INTESTAZIONE SEZIONE CON TASTO INDIETRO */
        .section-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 24px 25px 24px; }
        .back-btn { color: var(--text-main); text-decoration: none; font-size: 20px; transition: 0.2s; }
        .back-btn:active { opacity: 0.5; }
        .section-title { font-size: 18px; font-weight: 700; margin: 0; color: var(--text-main); }
        .spacer { width: 20px; } /* Serve a bilanciare la freccia e mantenere il testo centrato */

        /* CONTENITORE IMPOSTAZIONI */
        .settings-container { padding: 0 24px; flex-grow: 1; }

        /* COPYRIGHT */
        .copyright-footer { width: 100%; text-align: center; font-size: 10px; font-weight: 600; color: #b0b0b0; letter-spacing: 0.5px; padding-bottom: 10px; margin-top: 20px;}
    </style>
</head>
<body>

    <!-- HEADER SFUMATO IDENTICO ALLA HOME -->
    <div class="top-hero">
        <div class="hero-header-row">
            
            <div class="hero-brand">
                <div class="hero-logo-container">
                    <img src="logo.png" alt="VA Logo" class="hero-logo">
                </div>
                <div class="brand-title">SMART CLIMA<br>Avagliano's HOME</div>
            </div>
            
            <div class="hero-user">
                <div class="profile-btn" id="top-avatar-btn"><i class="fas fa-user"></i></div>
                <div class="hero-greeting" id="greeting-text">Ciao...</div>
            </div>

        </div>
    </div>

    <!-- TASTO INDIETRO E TITOLO -->
    <div class="section-header">
        <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
        <h2 class="section-title">Impostazioni</h2>
        <div class="spacer"></div>
    </div>

    <!-- CONTENUTO DELLE IMPOSTAZIONI -->
    <div class="settings-container">
        
        <!-- ========================================== -->
        <!-- QUI INSERISCI IL CODICE ESATTO DELLE TUE IMPOSTAZIONI GIA' FATTE -->
        <!-- ========================================== -->
        
    </div>

    <!-- COPYRIGHT -->
    <div class="copyright-footer">© Copyright 2026 - Vincenzo Avagliano</div>

    <!-- LOGICA FIREBASE SOLO PER CARICARE FOTO E NOME -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyDicCAPn-jBqZzX5SWvxFkTyjeO5VItxUo", authDomain: "smartclima-casa.firebaseapp.com", projectId: "smartclima-casa", storageBucket: "smartclima-casa.firebasestorage.app", messagingSenderId: "1075389846823", appId: "1:1075389846823:web:02fbdc2d55fdbddde84502" };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => { 
            if (user) {
                getDoc(doc(db, "utenti", user.uid)).then((userSnap) => {
                    const gt = document.getElementById('greeting-text');
                    if (userSnap.exists()) {
                        const uData = userSnap.data();
                        if (uData.nome && gt) gt.innerText = `Ciao ${uData.nome}`;
                        else if (gt) gt.innerText = "Ciao Utente";
                        
                        if (uData.foto) {
                            document.getElementById('top-avatar-btn').innerHTML = `<img src="${uData.foto}">`;
                        }
                    } else if (gt) {
                        gt.innerText = "Ciao Utente";
                    }
                });
            } else {
                window.location.assign("login.html");
            }
        });
    </script>
</body>
</html>
