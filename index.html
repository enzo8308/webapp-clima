<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Home Clima</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-color: #f0f5fa; 
            --card-bg: #ffffff; 
            --text-main: #1c1c1e; 
            --text-muted: #8e8e93; 
            --accent-color: #007aff; 
            --accent-bg: #e5f1ff; 
            --success-color: #34c759; 
            --warning-color: #ff9500; 
            --error-color: #ff3b30; 
        }
        body { margin: 0; padding: 0; font-family: 'Roboto', sans-serif; background-color: var(--bg-color); color: var(--text-main); padding-bottom: 110px; overflow-x: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: flex-start; padding: 30px 24px 15px 24px; }
        .greeting-box { display: flex; flex-direction: column; gap: 4px; }
        .greeting { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; color: var(--text-main); margin: 0; }
        .subtitle { font-size: 14px; font-weight: 500; color: var(--text-muted); margin: 0; }
        
        .profile-btn { width: 44px; height: 44px; border-radius: 22px; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--accent-color); box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s;}
        .profile-btn:active { transform: scale(0.9); }

        .summary-scroll { padding: 0 24px; margin-bottom: 25px; }
        .summary-widget { background: linear-gradient(135deg, #007aff, #0056b3); border-radius: 24px; padding: 20px; color: white; display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 20px rgba(0, 122, 255, 0.2); }
        .summary-icon { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .summary-text h3 { margin: 0; font-size: 15px; font-weight: 700; }
        .summary-text p { margin: 2px 0 0 0; font-size: 12px; opacity: 0.9; }

        .section-header { display: flex; justify-content: space-between; align-items: flex-end; padding: 0 24px; margin-bottom: 15px; }
        .section-title { font-size: 18px; font-weight: 700; margin: 0; }

        .device-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 0 24px; }
        
        .smart-card { background-color: var(--card-bg); border-radius: 28px; padding: 18px; box-shadow: 0 6px 20px rgba(0,0,0,0.03); display: flex; flex-direction: column; justify-content: space-between; aspect-ratio: 1 / 1.15; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; border: 1px solid rgba(0,0,0,0.02); cursor: pointer; }
        .smart-card:active { transform: scale(0.95); }
        
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .icon-box { width: 44px; height: 44px; border-radius: 22px; background: #f0f5fa; color: var(--text-muted); display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.4s; }
        
        .power-toggle { width: 34px; height: 34px; border-radius: 17px; background: #f0f5fa; color: var(--text-muted); display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; transition: 0.3s; z-index: 10; }
        
        .card-bottom { display: flex; flex-direction: column; gap: 4px; margin-top: auto;}
        .card-title { font-size: 15px; font-weight: 700; color: var(--text-main); margin: 0; letter-spacing: -0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .card-status { font-size: 12px; font-weight: 600; color: var(--text-muted); margin: 0; transition: 0.3s;}
        
        .connection-status { display: flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; text-transform: uppercase; margin-top: 8px; color: var(--text-muted);}
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--error-color); }
        .status-dot.online { background: var(--success-color); box-shadow: 0 0 6px rgba(52, 199, 89, 0.5); }
        .wifi-indicator { position: absolute; bottom: 18px; right: 18px; font-size: 13px; color: #d1d1d6; transition: color 0.3s; }

        .smart-card.is-on .icon-box { background: var(--accent-bg); color: var(--accent-color); }
        .smart-card.is-on .power-toggle { background: var(--accent-color); color: white; box-shadow: 0 4px 10px rgba(0, 122, 255, 0.3); }
        .smart-card.is-on .card-status { color: var(--accent-color); }

        /* PANNELLO PROFILO A COMPARSA */
        .sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; backdrop-filter: blur(3px); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .sheet-overlay.show { opacity: 1; pointer-events: all; }
        .bottom-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--card-bg); border-radius: 30px 30px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1001; padding: 20px 25px 40px 25px; box-sizing: border-box; text-align: center;}
        .bottom-sheet.open { bottom: 0; }
        .sheet-handle { width: 40px; height: 5px; background: #e0e0e0; border-radius: 5px; margin: 0 auto 20px auto; }
        
        .profile-pic-large { width: 70px; height: 70px; border-radius: 35px; background: var(--accent-bg); color: var(--accent-color); font-size: 30px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px auto; }
        .profile-email { font-size: 16px; font-weight: 700; color: var(--text-main); margin-bottom: 25px; }
        .btn-logout { width: 100%; background: #ffebe9; color: var(--error-color); border: none; padding: 16px; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s;}
        .btn-logout:active { transform: scale(0.95); }

        /* FLOATING NAV */
        .floating-nav { position: fixed; bottom: 25px; left: 24px; right: 24px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-radius: 30px; display: flex; justify-content: space-around; align-items: center; padding: 12px 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); border: 1px solid rgba(255, 255, 255, 0.4); z-index: 900; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); font-size: 10px; font-weight: 700; text-decoration: none; padding: 8px 15px; border-radius: 20px; transition: 0.3s; }
        .nav-item i { font-size: 22px; }
        .nav-item.active { color: var(--accent-color); background: var(--accent-bg); }
    </style>
</head>
<body>

    <div class="header">
        <div class="greeting-box">
            <h1 class="greeting">Casa</h1>
            <p class="subtitle">Bentornato!</p>
        </div>
        <div class="profile-btn" onclick="openProfile()"><i class="fas fa-user-circle"></i></div>
    </div>

    <div class="summary-scroll">
        <div class="summary-widget">
            <div class="summary-icon"><i class="fas fa-home"></i></div>
            <div class="summary-text">
                <h3>Smart Clima Cloud</h3>
                <p>Seleziona una stanza per regolarne il comfort.</p>
            </div>
        </div>
    </div>

    <div class="section-header">
        <h2 class="section-title">Le tue Stanze</h2>
    </div>

    <div class="device-grid" id="device-grid"></div>

    <div class="sheet-overlay" id="sheet-overlay" onclick="closeProfile()"></div>
    <div class="bottom-sheet" id="sheet-profile">
        <div class="sheet-handle"></div>
        <div class="profile-pic-large"><i class="fas fa-user"></i></div>
        <div class="profile-email" id="user-email-display">caricamento...</div>
        <button class="btn-logout" onclick="esciApp()"><i class="fas fa-sign-out-alt"></i> Esci dall'App</button>
    </div>

    <div class="floating-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="impostazioni.html" class="nav-item"><i class="fas fa-cog"></i><span>Impostazioni</span></a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.2.2/mqtt.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyDicCAPn-jBqZzX5SWvxFkTyjeO5VItxUo", authDomain: "smartclima-casa.firebaseapp.com", projectId: "smartclima-casa", storageBucket: "smartclima-casa.firebasestorage.app", messagingSenderId: "1075389846823", appId: "1:1075389846823:web:02fbdc2d55fdbddde84502" };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.stanzeState = {};

        onAuthStateChanged(auth, (user) => { 
            if (!user) window.location.href = "login.html"; 
            else document.getElementById('user-email-display').innerText = user.email;
        });

        window.openProfile = function() { document.getElementById('sheet-overlay').classList.add('show'); document.getElementById('sheet-profile').classList.add('open'); }
        window.closeProfile = function() { document.getElementById('sheet-overlay').classList.remove('show'); document.getElementById('sheet-profile').classList.remove('open'); }
        window.esciApp = function() { signOut(auth).then(() => { window.location.href = "login.html"; }); }
        window.apriDettagli = function(stanzaId) { window.location.href = `dettaglio.html?stanza=${stanzaId}`; }

        const clientMQTT = mqtt.connect("wss://broker.hivemq.com:8884/mqtt", { clientId: "webapp_home_" + Math.random().toString(16).substring(2, 10), clean: true });

        clientMQTT.on('connect', function () {
            // Sottoscrizione stato Cameretta originale
            clientMQTT.subscribe("vincenzo_clima_segreto_7788/status");
            clientMQTT.subscribe("vincenzo_clima_segreto_7788/sensor/segnale_wifi_cameretta/state");
            
            // Sottoscrizione per le altre stanze caricate in memoria
            Object.keys(window.stanzeState).forEach(id => {
                subscribeStanzaMQTT(id, window.stanzeState[id].topic);
            });
        });

        function subscribeStanzaMQTT(id, topic) {
            if (clientMQTT && clientMQTT.connected) {
                clientMQTT.subscribe(`vincenzo_clima_segreto_7788/climate/${topic}/mode/state`);
                clientMQTT.subscribe(`vincenzo_clima_segreto_7788/climate/${topic}/target_temperature/state`);
                // Le stanze nuove si sottoscrivono al proprio stato autonomo
                if (id !== 'cameretta') {
                    clientMQTT.subscribe(`vincenzo_clima_segreto_7788/${id}/status`);
                }
            }
        }

        const docRef = doc(db, "impostazioni", "stanze_config");
        
        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                const stanzeDb = docSnap.data();
                const grid = document.getElementById('device-grid');
                grid.innerHTML = '';
                
                for (const [id, config] of Object.entries(stanzeDb)) {
                    if(!window.stanzeState[id]) {
                        window.stanzeState[id] = { online: false, mode: "off", temp: 24, topic: config.topic, icon: config.icon, nome: config.nome };
                        subscribeStanzaMQTT(id, config.topic);
                    } else {
                        window.stanzeState[id].nome = config.nome;
                        window.stanzeState[id].icon = config.icon;
                        window.stanzeState[id].topic = config.topic;
                    }

                    const cardHTML = `
                    <div class="smart-card" id="card-${id}" onclick="apriDettagli('${id}')">
                        <div class="card-top">
                            <div class="icon-box" id="icon-box-${id}"><i class="fas ${config.icon}" id="icon-${id}"></i></div>
                            <div class="power-toggle" id="btn-power-${id}" onclick="event.stopPropagation(); togglePowerHome('${id}')">
                                <i class="fas fa-power-off"></i>
                            </div>
                        </div>
                        <div class="card-bottom">
                            <h4 class="card-title">${config.nome}</h4>
                            <p class="card-status" id="status-text-${id}">Connessione...</p>
                            <div class="connection-status"><span class="status-dot" id="dot-${id}"></span><span id="badge-${id}">Offline</span></div>
                        </div>
                        <div class="wifi-indicator"><i class="fas fa-wifi" id="wifi-icon-${id}"></i></div>
                    </div>`;
                    grid.insertAdjacentHTML('beforeend', cardHTML);
                    window.aggiornaUIStanza(id);
                    window.updateRoomStatusDOM(id);
                }
            } else {
                const defaultStanze = {
                    cameretta: { nome: "Cameretta", icon: "fa-rocket", topic: "haier_tundra_cameretta" },
                    soggiorno: { nome: "Soggiorno", icon: "fa-couch", topic: "haier_tundra_soggiorno" },
                    cucina: { nome: "Cucina", icon: "fa-utensils", topic: "haier_tundra_cucina" },
                    camera: { nome: "Camera da letto", icon: "fa-bed", topic: "haier_tundra_camera" }
                };
                setDoc(docRef, defaultStanze);
            }
        });

        window.updateRoomStatusDOM = function(id) {
            const s = window.stanzeState[id];
            if (!s) return;
            const badge = document.getElementById(`badge-${id}`);
            const dot = document.getElementById(`dot-${id}`);
            if(badge) badge.innerText = s.online ? "Online" : "Offline";
            if(dot) dot.className = s.online ? "status-dot online" : "status-dot";
            window.aggiornaUIStanza(id);
        }

        clientMQTT.on('message', function (topic, message) {
            const payload = message.toString().toLowerCase();
            
            // Cameretta Stato Master
            if (topic === "vincenzo_clima_segreto_7788/status") {
                if (window.stanzeState.cameretta) {
                    window.stanzeState.cameretta.online = (payload === "online");
                    window.updateRoomStatusDOM('cameretta');
                }
            }
            
            // Altre stanze (rispondono solo al proprio canale dedicato)
            Object.keys(window.stanzeState).forEach(id => {
                if (topic === `vincenzo_clima_segreto_7788/${id}/status`) {
                    window.stanzeState[id].online = (payload === "online");
                    window.updateRoomStatusDOM(id);
                }
            });
            
            // Regolazione parametri
            Object.keys(window.stanzeState).forEach(id => {
                const top = window.stanzeState[id].topic;
                if (topic.includes(`${top}/mode/state`)) { window.stanzeState[id].mode = payload; window.aggiornaUIStanza(id); }
                if (topic.includes(`${top}/target_temperature/state`)) { const t = parseFloat(payload); if(!isNaN(t)) window.stanzeState[id].temp = t; window.aggiornaUIStanza(id); }
            });

            // Segnale Wi-Fi Cameretta
            if (topic.includes("/sensor/segnale_wifi_cameretta/state") && window.stanzeState.cameretta) {
                const dbm = parseInt(payload); const wifiIcon = document.getElementById('wifi-icon-cameretta');
                if (wifiIcon && window.stanzeState.cameretta.online) {
                    if (dbm > -65) wifiIcon.style.color = 'var(--success-color)';
                    else if (dbm > -80) wifiIcon.style.color = 'var(--warning-color)';
                    else wifiIcon.style.color = 'var(--error-color)';
                }
            }
        });

        window.aggiornaUIStanza = function(id) {
            const card = document.getElementById(`card-${id}`); 
            if(!card) return; 
            
            const testo = document.getElementById(`status-text-${id}`);
            const icona = document.getElementById(`icon-${id}`);
            const s = window.stanzeState[id];

            if (s.mode === "off") { 
                card.classList.remove('is-on'); 
                testo.innerText = "Spento";
                icona.className = `fas ${s.icon}`;
            } else {
                card.classList.add('is-on');
                let modeIta = "Fresco"; let color = "#007aff"; let bg = "#e5f1ff"; let iconClass = "fas fa-snowflake";
                
                if(s.mode === "heat") { modeIta = "Caldo"; color = "#ff3b30"; bg = "#ffebe9"; iconClass = "fas fa-sun"; }
                if(s.mode === "dry") { modeIta = "Deumid."; color = "#5ac8fa"; bg = "#eef9ff"; iconClass = "fas fa-tint"; }
                if(s.mode === "fan_only") { modeIta = "Ventola"; color = "#8e8e93"; bg = "#f2f2f7"; iconClass = "fas fa-fan"; }
                if(s.mode === "auto") { modeIta = "Auto"; color = "#34c759"; bg = "#ebf9ee"; iconClass = "fas fa-magic"; }
                
                card.style.setProperty('--accent-color', color);
                card.style.setProperty('--accent-bg', bg);
                icona.className = iconClass;
                testo.innerText = `${modeIta} • ${s.temp}°C`;
            }

            const wifiIcon = document.getElementById(`wifi-icon-${id}`);
            if(wifiIcon) wifiIcon.style.color = s.online ? 'var(--success-color)' : '#d1d1d6';
        }

        window.togglePowerHome = function(id) {
            const s = window.stanzeState[id];
            if(!s) return;
            if(!s.online) { alert("Il condizionatore è Offline!"); return; }
            const nextMode = (s.mode === "off") ? "cool" : "off";
            clientMQTT.publish(`vincenzo_clima_segreto_7788/climate/${s.topic}/mode/command`, nextMode);
        };
    </script>
</body>
</html>
