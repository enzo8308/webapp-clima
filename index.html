<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Home Clima</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-color: #f0f5fa; /* Stesso azzurrino chiaro della pagina dettagli */
            --card-bg: #ffffff; 
            --text-main: #1c1c1e; 
            --text-muted: #8e8e93; 
            --accent-color: #007aff; 
            --accent-bg: #e5f1ff;
            --success-color: #34c759; 
            --error-color: #ff3b30;
        }
        
        body { margin: 0; padding: 0; font-family: 'Roboto', sans-serif; background-color: var(--bg-color); color: var(--text-main); padding-bottom: 110px; overflow-x: hidden; }
        
        /* HEADER E SALUTO */
        .header { display: flex; justify-content: space-between; align-items: flex-start; padding: 30px 24px 15px 24px; }
        .greeting-box { display: flex; flex-direction: column; gap: 4px; }
        .greeting { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; color: var(--text-main); margin: 0; }
        .subtitle { font-size: 14px; font-weight: 500; color: var(--text-muted); margin: 0; }
        
        .profile-btn { width: 44px; height: 44px; border-radius: 22px; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--accent-color); box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; }

        /* WIDGET SOMMARIO (HomeKit Style) */
        .summary-scroll { padding: 0 24px; margin-bottom: 25px; }
        .summary-widget { background: linear-gradient(135deg, #007aff, #0056b3); border-radius: 24px; padding: 20px; color: white; display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 20px rgba(0, 122, 255, 0.2); }
        .summary-icon { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .summary-text h3 { margin: 0; font-size: 15px; font-weight: 700; }
        .summary-text p { margin: 2px 0 0 0; font-size: 12px; opacity: 0.9; }

        /* SEZIONE DISPOSITIVI */
        .section-header { display: flex; justify-content: space-between; align-items: flex-end; padding: 0 24px; margin-bottom: 15px; }
        .section-title { font-size: 18px; font-weight: 700; margin: 0; }
        .add-btn { font-size: 22px; color: var(--accent-color); cursor: pointer; }

        .device-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 0 24px; }
        
        /* CARD MODERNA */
        .smart-card { background-color: var(--card-bg); border-radius: 28px; padding: 18px; box-shadow: 0 6px 20px rgba(0,0,0,0.03); display: flex; flex-direction: column; justify-content: space-between; aspect-ratio: 1 / 1.15; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; border: 1px solid rgba(0,0,0,0.02); }
        .smart-card:active { transform: scale(0.95); }
        
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
        
        /* Icona con sfondo che cambia colore */
        .icon-box { width: 44px; height: 44px; border-radius: 22px; background: #f0f5fa; color: var(--text-muted); display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.4s; }
        
        /* Tasto Power Integrato */
        .power-toggle { width: 34px; height: 34px; border-radius: 17px; background: #f0f5fa; color: var(--text-muted); display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; transition: 0.3s; z-index: 10; }
        .power-toggle:active { transform: scale(0.9); }
        
        .card-bottom { display: flex; flex-direction: column; gap: 4px; margin-top: auto;}
        .card-title { font-size: 15px; font-weight: 700; color: var(--text-main); margin: 0; letter-spacing: -0.3px;}
        .card-status { font-size: 12px; font-weight: 600; color: var(--text-muted); margin: 0; transition: 0.3s;}
        
        /* Connessione (Pallino stile Apple) */
        .connection-status { display: flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; text-transform: uppercase; margin-top: 8px; color: var(--text-muted);}
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--error-color); }
        .status-dot.online { background: var(--success-color); box-shadow: 0 0 6px rgba(52, 199, 89, 0.5); }
        
        /* --- STILI DINAMICI CARD ACCESA --- */
        .smart-card.is-on .icon-box { background: var(--accent-bg); color: var(--accent-color); }
        .smart-card.is-on .power-toggle { background: var(--accent-color); color: white; box-shadow: 0 4px 10px rgba(0, 122, 255, 0.3); }
        .smart-card.is-on .card-status { color: var(--accent-color); }


        /* BOTTOM NAV FLOATING (Effetto Vetro) */
        .floating-nav { position: fixed; bottom: 25px; left: 24px; right: 24px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-radius: 30px; display: flex; justify-content: space-around; align-items: center; padding: 12px 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); border: 1px solid rgba(255,255,255,0.4); z-index: 1000; }
        
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); font-size: 10px; font-weight: 700; text-decoration: none; padding: 8px 15px; border-radius: 20px; transition: 0.3s; }
        .nav-item i { font-size: 22px; }
        .nav-item.active { color: var(--accent-color); background: var(--accent-bg); }

    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="greeting-box">
            <h1 class="greeting">Casa</h1>
            <p class="subtitle">Bentornato, Vincenzo</p>
        </div>
        <div class="profile-btn"><i class="fas fa-user-circle"></i></div>
    </div>

    <!-- WIDGET SOMMARIO -->
    <div class="summary-scroll">
        <div class="summary-widget">
            <div class="summary-icon"><i class="fas fa-home"></i></div>
            <div class="summary-text">
                <h3 id="global-status-title">Sistema in attesa...</h3>
                <p id="global-status-desc">Sincronizzazione con la casa in corso.</p>
            </div>
        </div>
    </div>

    <div class="section-header">
        <h2 class="section-title">Le tue Stanze</h2>
        <i class="fas fa-plus-circle add-btn"></i>
    </div>

    <!-- GRIGLIA DISPOSITIVI -->
    <div class="device-grid">
        
        <!-- CARD CAMERETTA (Attiva) -->
        <div class="smart-card" id="card-cameretta" onclick="apriDettagli('cameretta')">
            <div class="card-top">
                <div class="icon-box" id="icon-box-cameretta"><i class="fas fa-snowflake" id="icon-cameretta"></i></div>
                <div class="power-toggle" id="btn-power-cameretta" onclick="event.stopPropagation(); togglePowerHome()">
                    <i class="fas fa-power-off"></i>
                </div>
            </div>
            <div class="card-bottom">
                <h4 class="card-title">Cameretta</h4>
                <p class="card-status" id="status-text-cameretta">In aggiornamento...</p>
                <div class="connection-status">
                    <span class="status-dot" id="dot-cameretta"></span>
                    <span id="badge-cameretta">Offline</span>
                </div>
            </div>
        </div>

        <!-- CARD SOGGIORNO (Fittizia per ora) -->
        <div class="smart-card" style="opacity: 0.6;">
            <div class="card-top">
                <div class="icon-box"><i class="fas fa-couch"></i></div>
                <div class="power-toggle"><i class="fas fa-power-off"></i></div>
            </div>
            <div class="card-bottom">
                <h4 class="card-title">Soggiorno</h4>
                <p class="card-status">Da configurare</p>
                <div class="connection-status"><span class="status-dot"></span><span>Offline</span></div>
            </div>
        </div>

        <!-- CARD CUCINA (Fittizia per ora) -->
        <div class="smart-card" style="opacity: 0.6;">
            <div class="card-top">
                <div class="icon-box"><i class="fas fa-utensils"></i></div>
                <div class="power-toggle"><i class="fas fa-power-off"></i></div>
            </div>
            <div class="card-bottom">
                <h4 class="card-title">Cucina</h4>
                <p class="card-status">Da configurare</p>
                <div class="connection-status"><span class="status-dot"></span><span>Offline</span></div>
            </div>
        </div>

        <!-- CARD CAMERA LETTO (Fittizia per ora) -->
        <div class="smart-card" style="opacity: 0.6;">
            <div class="card-top">
                <div class="icon-box"><i class="fas fa-bed"></i></div>
                <div class="power-toggle"><i class="fas fa-power-off"></i></div>
            </div>
            <div class="card-bottom">
                <h4 class="card-title">Camera</h4>
                <p class="card-status">Da configurare</p>
                <div class="connection-status"><span class="status-dot"></span><span>Offline</span></div>
            </div>
        </div>

    </div>

    <!-- FLOATING BOTTOM NAV (Effetto Vetro) -->
    <div class="floating-nav">
        <a href="#" class="nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="#" class="nav-item"><i class="fas fa-chart-line"></i><span>Statistiche</span></a>
        <a href="#" class="nav-item"><i class="fas fa-cog"></i><span>Impostazioni</span></a>
        <a href="#" class="nav-item" onclick="esci()"><i class="fas fa-sign-out-alt"></i><span>Esci</span></a>
    </div>

    <!-- Firebase Auth per l'accesso protetto -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        const firebaseConfig = { apiKey: "AIzaSyDicCAPn-jBqZzX5SWvxFkTyjeO5VItxUo", authDomain: "smartclima-casa.firebaseapp.com", projectId: "smartclima-casa", storageBucket: "smartclima-casa.firebasestorage.app", messagingSenderId: "1075389846823", appId: "1:1075389846823:web:02fbdc2d55fdbddde84502" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "login.html"; });
        window.esci = function() { signOut(auth).then(() => { window.location.href = "login.html"; }); };
    </script>

    <!-- LOGICA MQTT E AGGIORNAMENTO GRAFICA HOME -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.2.2/mqtt.min.js"></script>
    <script>
        function apriDettagli(stanza) {
            // Predisposizione per il Multi-Stanza (Passerà il nome nell'URL)
            if(stanza !== 'cameretta') alert("Questo condizionatore non è ancora stato collegato.");
            else window.location.href = `dettaglio.html?stanza=${stanza}`;
        }

        const clientMQTT = mqtt.connect("wss://broker.hivemq.com:8884/mqtt", { clientId: "webapp_index_" + Math.random().toString(16).substring(2, 10), clean: true });
        let statoAttuale = { online: false, mode: "OFF", temp: 24 };
        const baseTopic = "vincenzo_clima_segreto_7788/climate/haier_tundra_cameretta";

        clientMQTT.on('connect', function () {
            clientMQTT.subscribe("vincenzo_clima_segreto_7788/status");
            clientMQTT.subscribe(baseTopic + "/mode/state");
            clientMQTT.subscribe(baseTopic + "/target_temperature/state");
        });

        clientMQTT.on('message', function (topic, message) {
            const payload = message.toString().toLowerCase();
            
            // STATO ONLINE/OFFLINE
            if (topic.includes("/status")) {
                const badge = document.getElementById('badge-cameretta');
                const dot = document.getElementById('dot-cameretta');
                if (payload === "online") {
                    statoAttuale.online = true; 
                    badge.innerText = "Online"; 
                    dot.className = "status-dot online";
                    document.getElementById('global-status-title').innerText = "Tutto connesso";
                    document.getElementById('global-status-desc').innerText = "La casa è pronta e operativa.";
                } else {
                    statoAttuale.online = false; 
                    badge.innerText = "Offline"; 
                    dot.className = "status-dot";
                    document.getElementById('global-status-title').innerText = "Dispositivo Offline";
                    document.getElementById('global-status-desc').innerText = "Verifica la connessione in Cameretta.";
                }
            }
            
            // MODALITÀ
            if (topic.includes("/mode/state")) { 
                statoAttuale.mode = payload; 
                aggiornaInterfaccia(); 
            }
            
            // TEMPERATURA
            if (topic.includes("/target_temperature/state")) { 
                const t = parseFloat(payload); 
                if(!isNaN(t)) statoAttuale.temp = t; 
                aggiornaInterfaccia(); 
            }
        });

        function aggiornaInterfaccia() {
            const card = document.getElementById('card-cameretta'); 
            const testo = document.getElementById('status-text-cameretta');
            const icona = document.getElementById('icon-cameretta');
            
            // Resetta colori variabili css per la singola card
            if (statoAttuale.mode === "off") { 
                card.classList.remove('is-on'); 
                testo.innerText = "Spento";
                icona.className = "fas fa-power-off";
            }
            else {
                card.classList.add('is-on');
                
                let modeIta = "Fresco"; let color = "#007aff"; let bg = "#e5f1ff"; let iconClass = "fas fa-snowflake";
                
                if(statoAttuale.mode === "heat") { modeIta = "Caldo"; color = "#ff3b30"; bg = "#ffebe9"; iconClass = "fas fa-sun"; }
                if(statoAttuale.mode === "dry") { modeIta = "Deumid."; color = "#5ac8fa"; bg = "#eef9ff"; iconClass = "fas fa-tint"; }
                if(statoAttuale.mode === "fan_only") { modeIta = "Ventola"; color = "#8e8e93"; bg = "#f2f2f7"; iconClass = "fas fa-fan"; }
                if(statoAttuale.mode === "auto") { modeIta = "Auto"; color = "#34c759"; bg = "#ebf9ee"; iconClass = "fas fa-magic"; }
                
                // Applica colori dinamici alla scheda tramite CSS variables
                card.style.setProperty('--accent-color', color);
                card.style.setProperty('--accent-bg', bg);
                
                icona.className = iconClass;
                testo.innerText = `${modeIta} • ${statoAttuale.temp}°C`;
            }
        }

        // Accensione / Spegnimento rapido dalla Home
        window.togglePowerHome = function() {
            if(!statoAttuale.online) { alert("Il condizionatore è Offline!"); return; }
            clientMQTT.publish(baseTopic + "/mode/command", (statoAttuale.mode === "off") ? "cool" : "off");
        };
    </script>
</body>
</html>
