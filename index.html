<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Home Clima</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-color: #f0f5fa; 
            --card-bg: #ffffff; 
            --text-main: #1c1c1e; 
            --text-muted: #8e8e93; 
            --accent-color: #007aff; 
            --accent-bg: #e5f1ff;
            --success-color: #34c759; 
            --warning-color: #ff9500;
            --error-color: #ff3b30;
        }
        
        body { margin: 0; padding: 0; font-family: 'Roboto', sans-serif; background-color: var(--bg-color); color: var(--text-main); padding-bottom: 110px; overflow-x: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: flex-start; padding: 30px 24px 15px 24px; }
        .greeting-box { display: flex; flex-direction: column; gap: 4px; }
        .greeting { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; color: var(--text-main); margin: 0; }
        .subtitle { font-size: 14px; font-weight: 500; color: var(--text-muted); margin: 0; }
        
        .profile-btn { width: 44px; height: 44px; border-radius: 22px; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--accent-color); box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; }

        .summary-scroll { padding: 0 24px; margin-bottom: 25px; }
        .summary-widget { background: linear-gradient(135deg, #007aff, #0056b3); border-radius: 24px; padding: 20px; color: white; display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 20px rgba(0, 122, 255, 0.2); }
        .summary-icon { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .summary-text h3 { margin: 0; font-size: 15px; font-weight: 700; }
        .summary-text p { margin: 2px 0 0 0; font-size: 12px; opacity: 0.9; }

        .section-header { display: flex; justify-content: space-between; align-items: flex-end; padding: 0 24px; margin-bottom: 15px; }
        .section-title { font-size: 18px; font-weight: 700; margin: 0; }

        .device-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 0 24px; }
        
        /* CARD BASE (BLOCCATA DI DEFAULT) */
        .smart-card { background-color: var(--card-bg); border-radius: 28px; padding: 18px; box-shadow: 0 6px 20px rgba(0,0,0,0.03); display: flex; flex-direction: column; justify-content: space-between; aspect-ratio: 1 / 1.15; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; border: 1px solid rgba(0,0,0,0.02); 
            opacity: 0.5; pointer-events: none; /* Bloccata finché Firebase non dà l'OK */
        }
        .smart-card.unlocked { opacity: 1; pointer-events: all; cursor: pointer; }
        .smart-card.unlocked:active { transform: scale(0.95); }
        
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .icon-box { width: 44px; height: 44px; border-radius: 22px; background: #f0f5fa; color: var(--text-muted); display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.4s; }
        
        .power-toggle { width: 34px; height: 34px; border-radius: 17px; background: #f0f5fa; color: var(--text-muted); display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; transition: 0.3s; z-index: 10; display: none; }
        .smart-card.unlocked .power-toggle { display: flex; }
        
        .card-bottom { display: flex; flex-direction: column; gap: 4px; margin-top: auto;}
        .card-title { font-size: 15px; font-weight: 700; color: var(--text-main); margin: 0; letter-spacing: -0.3px;}
        .card-status { font-size: 12px; font-weight: 600; color: var(--text-muted); margin: 0; transition: 0.3s;}
        
        .connection-status { display: flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; text-transform: uppercase; margin-top: 8px; color: var(--text-muted);}
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--error-color); }
        .status-dot.online { background: var(--success-color); box-shadow: 0 0 6px rgba(52, 199, 89, 0.5); }
        .wifi-indicator { position: absolute; bottom: 18px; right: 18px; font-size: 13px; color: #d1d1d6; transition: color 0.3s; display: none; }
        .smart-card.unlocked .wifi-indicator { display: block; }

        /* MODIFICHE CARD ACCESE */
        .smart-card.is-on .icon-box { background: var(--accent-bg); color: var(--accent-color); }
        .smart-card.is-on .power-toggle { background: var(--accent-color); color: white; box-shadow: 0 4px 10px rgba(0, 122, 255, 0.3); }
        .smart-card.is-on .card-status { color: var(--accent-color); }

        /* FLOATING BOTTOM NAV */
        .floating-nav { position: fixed; bottom: 25px; left: 24px; right: 24px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-radius: 30px; display: flex; justify-content: space-around; align-items: center; padding: 12px 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); border: 1px solid rgba(255,255,255,0.4); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); font-size: 10px; font-weight: 700; text-decoration: none; padding: 8px 15px; border-radius: 20px; transition: 0.3s; }
        .nav-item i { font-size: 22px; }
        .nav-item.active { color: var(--accent-color); background: var(--accent-bg); }
    </style>
</head>
<body>

    <div class="header">
        <div class="greeting-box">
            <h1 class="greeting">Casa</h1>
            <p class="subtitle">Bentornato, Vincenzo</p>
        </div>
        <div class="profile-btn"><i class="fas fa-user-circle"></i></div>
    </div>

    <div class="summary-scroll">
        <div class="summary-widget">
            <div class="summary-icon"><i class="fas fa-home"></i></div>
            <div class="summary-text">
                <h3 id="global-status-title">Smart Clima Cloud</h3>
                <p id="global-status-desc">Seleziona una stanza per regolarne il comfort.</p>
            </div>
        </div>
    </div>

    <div class="section-header">
        <h2 class="section-title">Le tue Stanze</h2>
    </div>

    <div class="device-grid">
        
        <div class="smart-card unlocked" id="card-cameretta" onclick="apriDettagli('cameretta')">
            <div class="card-top">
                <div class="icon-box" id="icon-box-cameretta"><i class="fas fa-rocket" id="icon-cameretta"></i></div>
                <div class="power-toggle" id="btn-power-cameretta" onclick="event.stopPropagation(); togglePowerHome('cameretta')">
                    <i class="fas fa-power-off"></i>
                </div>
            </div>
            <div class="card-bottom">
                <h4 class="card-title">Cameretta</h4>
                <p class="card-status" id="status-text-cameretta">Connessione...</p>
                <div class="connection-status"><span class="status-dot" id="dot-cameretta"></span><span id="badge-cameretta">Offline</span></div>
            </div>
            <div class="wifi-indicator"><i class="fas fa-wifi" id="wifi-icon-cameretta"></i></div>
        </div>

        <div class="smart-card" id="card-soggiorno" onclick="apriDettagli('soggiorno')">
            <div class="card-top">
                <div class="icon-box" id="icon-box-soggiorno"><i class="fas fa-couch" id="icon-soggiorno"></i></div>
                <div class="power-toggle" id="btn-power-soggiorno" onclick="event.stopPropagation(); togglePowerHome('soggiorno')">
                    <i class="fas fa-power-off"></i>
                </div>
            </div>
            <div class="card-bottom">
                <h4 class="card-title">Soggiorno</h4>
                <p class="card-status" id="status-text-soggiorno">Non configurato</p>
                <div class="connection-status"><span class="status-dot" id="dot-soggiorno"></span><span id="badge-soggiorno">Offline</span></div>
            </div>
            <div class="wifi-indicator"><i class="fas fa-wifi" id="wifi-icon-soggiorno"></i></div>
        </div>

        <div class="smart-card" id="card-cucina" onclick="apriDettagli('cucina')">
            <div class="card-top">
                <div class="icon-box" id="icon-box-cucina"><i class="fas fa-utensils" id="icon-cucina"></i></div>
                <div class="power-toggle" id="btn-power-cucina" onclick="event.stopPropagation(); togglePowerHome('cucina')">
                    <i class="fas fa-power-off"></i>
                </div>
            </div>
            <div class="card-bottom">
                <h4 class="card-title">Cucina</h4>
                <p class="card-status" id="status-text-cucina">Non configurato</p>
                <div class="connection-status"><span class="status-dot" id="dot-cucina"></span><span id="badge-cucina">Offline</span></div>
            </div>
            <div class="wifi-indicator"><i class="fas fa-wifi" id="wifi-icon-cucina"></i></div>
        </div>

        <div class="smart-card" id="card-camera" onclick="apriDettagli('camera')">
            <div class="card-top">
                <div class="icon-box" id="icon-box-camera"><i class="fas fa-bed" id="icon-camera"></i></div>
                <div class="power-toggle" id="btn-power-camera" onclick="event.stopPropagation(); togglePowerHome('camera')">
                    <i class="fas fa-power-off"></i>
                </div>
            </div>
            <div class="card-bottom">
                <h4 class="card-title">Camera da letto</h4>
                <p class="card-status" id="status-text-camera">Non configurato</p>
                <div class="connection-status"><span class="status-dot" id="dot-camera"></span><span id="badge-camera">Offline</span></div>
            </div>
            <div class="wifi-indicator"><i class="fas fa-wifi" id="wifi-icon-camera"></i></div>
        </div>

    </div>

    <div class="floating-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="impostazioni.html" class="nav-item"><i class="fas fa-cog"></i><span>Impostazioni</span></a>
        <a href="#" class="nav-item" onclick="esci()"><i class="fas fa-sign-out-alt"></i><span>Esci</span></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyDicCAPn-jBqZzX5SWvxFkTyjeO5VItxUo", authDomain: "smartclima-casa.firebaseapp.com", projectId: "smartclima-casa", storageBucket: "smartclima-casa.firebasestorage.app", messagingSenderId: "1075389846823", appId: "1:1075389846823:web:02fbdc2d55fdbddde84502" };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "login.html"; });
        window.esci = function() { signOut(auth).then(() => { window.location.href = "login.html"; }); };

        // METTE L'APP IN ASCOLTO DELLE STANZE ATTIVATE SU CLOUD
        const docRef = doc(db, "impostazioni", "stanze");
        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                const stanzeAttive = docSnap.data();
                // Sblocca o Blocca le card in base a Firebase
                toggleCardUnlock('soggiorno', stanzeAttive.soggiorno);
                toggleCardUnlock('cucina', stanzeAttive.cucina);
                toggleCardUnlock('camera', stanzeAttive.camera);
            }
        });

        function toggleCardUnlock(id, isUnlocked) {
            const card = document.getElementById(`card-${id}`);
            const statusText = document.getElementById(`status-text-${id}`);
            if(isUnlocked) {
                card.classList.add('unlocked');
                if(statusText.innerText === "Non configurato") statusText.innerText = "Spento";
            } else {
                card.classList.remove('unlocked');
                statusText.innerText = "Non configurato";
            }
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.2.2/mqtt.min.js"></script>
    <script>
        function apriDettagli(stanza) {
            window.location.href = `dettaglio.html?stanza=${stanza}`;
        }

        const clientMQTT = mqtt.connect("wss://broker.hivemq.com:8884/mqtt", { clientId: "webapp_index_" + Math.random().toString(16).substring(2, 10), clean: true });
        
        // Struttura dati per gestire tutte le stanze dinamicamente
        let stanze = {
            cameretta: { online: false, mode: "off", temp: 24, topic: "haier_tundra_cameretta", icon: "fa-rocket" },
            soggiorno: { online: false, mode: "off", temp: 24, topic: "haier_tundra_soggiorno", icon: "fa-couch" },
            cucina: { online: false, mode: "off", temp: 24, topic: "haier_tundra_cucina", icon: "fa-utensils" },
            camera: { online: false, mode: "off", temp: 24, topic: "haier_tundra_camera", icon: "fa-bed" }
        };

        clientMQTT.on('connect', function () {
            // Canali di stato generali e specifici delle stanze
            clientMQTT.subscribe("vincenzo_clima_segreto_7788/status");
            Object.keys(stanze).forEach(s => {
                clientMQTT.subscribe(`vincenzo_clima_segreto_7788/climate/${stanze[s].topic}/mode/state`);
                clientMQTT.subscribe(`vincenzo_clima_segreto_7788/climate/${stanze[s].topic}/target_temperature/state`);
            });
            clientMQTT.subscribe("vincenzo_clima_segreto_7788/sensor/segnale_wifi_cameretta/state");
        });

        clientMQTT.on('message', function (topic, message) {
            const payload = message.toString().toLowerCase();
            
            // Gestione Online Generale (Per ora agganciato allo status master)
            if (topic.includes("/status")) {
                const isOnline = (payload === "online");
                Object.keys(stanze).forEach(s => {
                    stanze[s].online = isOnline;
                    document.getElementById(`badge-${s}`).innerText = isOnline ? "Online" : "Offline";
                    document.getElementById(`dot-${s}`).className = isOnline ? "status-dot online" : "status-dot";
                });
            }
            
            // Smistamento dinamico dei messaggi MQTT alle singole card
            Object.keys(stanze).forEach(s => {
                if (topic.includes(stanze[s].topic + "/mode/state")) { stanze[s].mode = payload; aggiornaUIStanza(s); }
                if (topic.includes(stanze[s].topic + "/target_temperature/state")) { const t = parseFloat(payload); if(!isNaN(t)) stanze[s].temp = t; aggiornaUIStanza(s); }
            });

            // Wi-Fi Cameretta Master
            if (topic.includes("/segnale_wifi_cameretta/state") && stanze.cameretta.online) {
                const dbm = parseInt(payload); const wifiIcon = document.getElementById('wifi-icon-cameretta');
                if (dbm > -65) wifiIcon.style.color = 'var(--success-color)';
                else if (dbm > -80) wifiIcon.style.color = 'var(--warning-color)';
                else wifiIcon.style.color = 'var(--error-color)';
            }
        });

        function aggiornaUIStanza(s) {
            const card = document.getElementById(`card-${s}`); 
            const testo = document.getElementById(`status-text-${s}`);
            const icona = document.getElementById(`icon-${s}`);
            
            if (stanze[s].mode === "off") { 
                card.classList.remove('is-on'); 
                testo.innerText = "Spento";
                icona.className = `fas ${stanze[s].icon}`; // Torna all'icona della stanza
            } else {
                card.classList.add('is-on');
                let modeIta = "Fresco"; let color = "#007aff"; let bg = "#e5f1ff"; let iconClass = "fas fa-snowflake";
                
                if(stanze[s].mode === "heat") { modeIta = "Caldo"; color = "#ff3b30"; bg = "#ffebe9"; iconClass = "fas fa-sun"; }
                if(stanze[s].mode === "dry") { modeIta = "Deumid."; color = "#5ac8fa"; bg = "#eef9ff"; iconClass = "fas fa-tint"; }
                if(stanze[s].mode === "fan_only") { modeIta = "Ventola"; color = "#8e8e93"; bg = "#f2f2f7"; iconClass = "fas fa-fan"; }
                if(stanze[s].mode === "auto") { modeIta = "Auto"; color = "#34c759"; bg = "#ebf9ee"; iconClass = "fas fa-magic"; }
                
                card.style.setProperty('--accent-color', color);
                card.style.setProperty('--accent-bg', bg);
                icona.className = iconClass; // Diventa l'icona del clima attivo
                testo.innerText = `${modeIta} • ${stanze[s].temp}°C`;
            }
        }

        window.togglePowerHome = function(s) {
            if(!stanze[s].online) { alert("Il condizionatore è Offline!"); return; }
            const nextMode = (stanze[s].mode === "off") ? "cool" : "off";
            clientMQTT.publish(`vincenzo_clima_segreto_7788/climate/${stanze[s].topic}/mode/command`, nextMode);
        };
    </script>
</body>
</html>
