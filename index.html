<!DOCTYPE html>
<html lang="it">
<head>
<link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#061b30">
    <meta name="mobile-web-app-capable" content="yes">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Smart Clima">
    <link rel="apple-touch-icon" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Home Clima</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-color: #f0f5fa; 
            --card-bg: #ffffff; 
            --text-main: #1c1c1e; 
            --text-muted: #8e8e93; 
            --accent-color: #007aff; 
            --accent-bg: #e5f1ff; 
            --success-color: #34c759; 
            --warning-color: #ff9500; 
            --error-color: #ff3b30; 
        }
        body { margin: 0; padding: 0; font-family: 'Roboto', sans-serif; background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; user-select: none; -webkit-user-select: none; position: relative; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* HEADER SFUMATO (HERO SECTION) */
        .top-hero { 
            background: linear-gradient(180deg, #061b30 0%, #0056b3 60%, var(--bg-color) 100%); 
            padding: 35px 24px 20px 24px; 
            color: white; 
        }
        
        .hero-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* LOGO E TESTO A SINISTRA */
        .hero-brand { display: flex; align-items: center; gap: 12px; }
        .brand-title { color: #ffffff; font-size: 14px; font-weight: 800; line-height: 1.2; letter-spacing: 0.3px; }
        .hero-logo-container { background-color: white; border-radius: 14px; padding: 8px; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(0,0,0,0.2); width: 60px; height: 60px; flex-shrink: 0;}
        .hero-logo { width: 100%; height: 100%; object-fit: contain; }

        /* OMINO E SALUTO A DESTRA */
        .hero-user { cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; margin-top: 2px;}
        .profile-btn { width: 50px; height: 50px; border-radius: 25px; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--accent-color); box-shadow: 0 4px 15px rgba(0,0,0,0.15); transition: 0.2s; overflow: hidden; border: 2px solid white; flex-shrink: 0; }
        .profile-btn img { width: 100%; height: 100%; object-fit: cover; }
        .profile-btn:active { transform: scale(0.9); }
        .hero-greeting { font-size: 10px; font-weight: 600; color: white; margin: 0; text-align: center; }

        /* SEZIONE STANZE E TASTO IMPOSTAZIONI */
        .section-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 24px 5px 24px; }
        .section-title { font-size: 18px; font-weight: 700; margin: 0; color: var(--text-main); }
        .settings-btn { width: 36px; height: 36px; border-radius: 18px; background: #fff; color: var(--text-muted); display: flex; align-items: center; justify-content: center; font-size: 16px; text-decoration: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: 0.2s;}
        .settings-btn:active { transform: scale(0.9); color: var(--accent-color); }

        /* GRIGLIA STANZE */
        .device-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 15px 24px 15px 24px; position: relative; flex-grow: 1;}
        
        .smart-card { background-color: var(--card-bg); border-radius: 28px; padding: 18px; box-shadow: 0 6px 20px rgba(0,0,0,0.03); display: flex; flex-direction: column; justify-content: space-between; aspect-ratio: 1 / 1.15; transition: transform 0.2s, box-shadow 0.2s; position: relative; border: 1px solid rgba(0,0,0,0.02); cursor: pointer; }
        .smart-card:active:not(.dragging) { transform: scale(0.95); }
        .smart-card.dragging { opacity: 0.5; transform: scale(1.05); box-shadow: 0 15px 30px rgba(0,0,0,0.1); cursor: grabbing; z-index: 999; touch-action: none; }
        
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .icon-box { width: 44px; height: 44px; border-radius: 22px; background: #f0f5fa; color: var(--text-muted); display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.4s; }
        .power-toggle { width: 34px; height: 34px; border-radius: 17px; background: #f0f5fa; color: var(--text-muted); display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; transition: 0.3s; z-index: 10; }
        
        .card-bottom { display: flex; flex-direction: column; gap: 4px; margin-top: auto;}
        .card-title { font-size: 15px; font-weight: 700; color: var(--text-main); margin: 0; letter-spacing: -0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .card-status { font-size: 12px; font-weight: 600; color: var(--text-muted); margin: 0; transition: 0.3s;}
        
        .connection-status { display: flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; text-transform: uppercase; margin-top: 8px; color: var(--text-muted);}
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--error-color); }
        .status-dot.online { background: var(--success-color); box-shadow: 0 0 6px rgba(52, 199, 89, 0.5); }
        .wifi-indicator { position: absolute; bottom: 18px; right: 18px; font-size: 13px; color: #d1d1d6; transition: color 0.3s; }

        .smart-card.is-on .icon-box { background: var(--accent-bg); color: var(--accent-color); }
        .smart-card.is-on .power-toggle { background: var(--accent-color); color: white; box-shadow: 0 4px 10px rgba(0, 122, 255, 0.3); }
        .smart-card.is-on .card-status { color: var(--accent-color); }

        /* BOTTOM SHEET PROFILO */
        .sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; backdrop-filter: blur(3px); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .sheet-overlay.show { opacity: 1; pointer-events: all; }
        .bottom-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--card-bg); border-radius: 30px 30px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1001; padding: 25px 25px 40px 25px; box-sizing: border-box; text-align: center;}
        .bottom-sheet.open { bottom: 0; }
        .sheet-handle { width: 40px; height: 5px; background: #e0e0e0; border-radius: 5px; margin: 0 auto 20px auto; }
        
        .profile-pic-container { position: relative; width: 80px; height: 70px; margin: 0 auto 10px auto; cursor: pointer; }
        .profile-pic-large { width: 70px; height: 70px; border-radius: 35px; background: var(--accent-bg); color: var(--accent-color); font-size: 30px; display: flex; align-items: center; justify-content: center; margin: 0 auto; overflow: hidden; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .profile-pic-large img { width: 100%; height: 100%; object-fit: cover; }
        .photo-edit-badge { position: absolute; bottom: 0; right: 5px; width: 24px; height: 24px; border-radius: 12px; background: var(--accent-color); color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .form-input { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid #e0e0e0; background: #f8f9fa; font-size: 16px; font-weight: 700; color: var(--text-main); text-align: center; box-sizing: border-box; outline: none; margin-top: 10px; font-family: 'Roboto', sans-serif;}
        .form-input:focus { border-color: var(--accent-color); background: white; }
        .profile-email { font-size: 12px; color: var(--text-muted); margin: 8px 0 25px 0; font-weight: 500; }

        .btn-action { width: 100%; background: var(--accent-color); color: white; border: none; padding: 16px; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3); font-family: 'Roboto', sans-serif; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .btn-logout { width: 100%; background: #ffebe9; color: var(--error-color); border: none; padding: 16px; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s;}
        .btn-logout:active { transform: scale(0.95); }

        /* FOOTER COPYRIGHT */
        .copyright-footer { width: 100%; text-align: center; font-size: 10px; font-weight: 600; color: #b0b0b0; letter-spacing: 0.5px; padding-bottom: 10px;}
    </style>
</head>
<body>

    <!-- HERO SECTION -->
    <div class="top-hero">
        <div class="hero-header-row">
            
            <!-- Logo a Sinistra con testo a fianco -->
            <div class="hero-brand">
                <div class="hero-logo-container">
                    <img src="logo.png" alt="VA Logo" class="hero-logo">
                </div>
                <div class="brand-title">SMART CLIMA<br>Avagliano's HOME</div>
            </div>
            
            <!-- Omino a Destra con saluto piccolino sotto -->
            <div class="hero-user" onclick="openProfile()">
                <div class="profile-btn" id="top-avatar-btn"><i class="fas fa-user"></i></div>
                <div class="hero-greeting" id="greeting-text">Ciao...</div>
            </div>

        </div>
    </div>

    <!-- SEZIONE STANZE E IMPOSTAZIONI -->
    <div class="section-header">
        <h2 class="section-title">Le tue Stanze</h2>
        <a href="impostazioni.html" class="settings-btn"><i class="fas fa-cog"></i></a>
    </div>

    <!-- GRIGLIA -->
    <div class="device-grid" id="device-grid"></div>

    <!-- COPYRIGHT FOOTER IN BASSO -->
    <div class="copyright-footer">© Copyright 2026 - Vincenzo Avagliano</div>

    <!-- BOTTOM SHEET PROFILO -->
    <div class="sheet-overlay" id="sheet-overlay" onclick="closeProfile()"></div>
    <div class="bottom-sheet" id="sheet-profile">
        <div class="sheet-handle"></div>
        
        <div class="profile-pic-container" onclick="triggerPhotoSelect()">
            <div class="profile-pic-large" id="sheet-avatar-view"><i class="fas fa-user"></i></div>
            <div class="photo-edit-badge"><i class="fas fa-camera"></i></div>
        </div>
        
        <input type="file" id="photo-file-input" accept="image/*" style="display:none;" onchange="loadPhotoLocal(event)">
        
        <div style="padding: 0 10px;">
            <input type="text" class="form-input" id="profile-name-input" placeholder="Inserisci il tuo Nome">
        </div>
        <div class="profile-email" id="user-email-display">caricamento...</div>
        
        <button class="btn-action" id="btn-save-profile" onclick="saveProfileCloud()"><i class="fas fa-save"></i> Salva Profilo</button>
        <button class="btn-logout" onclick="esciApp()"><i class="fas fa-sign-out-alt"></i> Esci dall'App</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.2.2/mqtt.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyDicCAPn-jBqZzX5SWvxFkTyjeO5VItxUo", authDomain: "smartclima-casa.firebaseapp.com", projectId: "smartclima-casa", storageBucket: "smartclima-casa.firebasestorage.app", messagingSenderId: "1075389846823", appId: "1:1075389846823:web:02fbdc2d55fdbddde84502" };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let base64PhotoStr = "";
        window.stanzeState = {};
        window.stanzeRawConfig = {};
        window.isDragging = false; 

        onAuthStateChanged(auth, (user) => { 
            if (!user) {
                window.location.assign("login.html"); 
            } else {
                currentUser = user;
                document.getElementById('user-email-display').innerText = user.email;
                
                onSnapshot(doc(db, "utenti", user.uid), (userSnap) => {
                    const gt = document.getElementById('greeting-text');
                    if (userSnap.exists()) {
                        const uData = userSnap.data();
                        if (uData.nome) {
                            document.getElementById('profile-name-input').value = uData.nome;
                            if(gt) gt.innerText = `Ciao ${uData.nome}`;
                        } else {
                            if(gt) gt.innerText = "Ciao Utente";
                        }
                        if (uData.foto) {
                            base64PhotoStr = uData.foto;
                            const imgHtml = `<img src="${uData.foto}">`;
                            document.getElementById('top-avatar-btn').innerHTML = imgHtml;
                            document.getElementById('sheet-avatar-view').innerHTML = imgHtml;
                        }
                    } else {
                        if(gt) gt.innerText = "Ciao Utente";
                    }
                });
            }
        });

        window.openProfile = function() { document.getElementById('sheet-overlay').classList.add('show'); document.getElementById('sheet-profile').classList.add('open'); }
        window.closeProfile = function() { document.getElementById('sheet-overlay').classList.remove('show'); document.getElementById('sheet-profile').classList.remove('open'); }
        window.esciApp = function() { signOut(auth).then(() => { window.location.assign("login.html"); }); }
        window.triggerPhotoSelect = function() { document.getElementById('photo-file-input').click(); }
        
        window.loadPhotoLocal = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 120; const MAX_HEIGHT = 120;
                    let width = img.width; let height = img.height;
                    if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } }
                    else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    base64PhotoStr = canvas.toDataURL('image/jpeg', 0.7); 
                    document.getElementById('sheet-avatar-view').innerHTML = `<img src="${base64PhotoStr}">`;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        window.saveProfileCloud = function() {
            if(!currentUser) return;
            const btn = document.getElementById('btn-save-profile');
            btn.innerText = "Salvataggio Cloud...";
            const nomeInput = document.getElementById('profile-name-input').value.trim();
            
            setDoc(doc(db, "utenti", currentUser.uid), { nome: nomeInput, foto: base64PhotoStr }, { merge: true })
                .then(() => {
                    btn.innerHTML = `<i class="fas fa-save"></i> Salva Profilo`;
                    closeProfile();
                });
        }

        window.apriDettagli = function(stanzaId) {
            if (window.isDragging) return;
            window.location.href = `dettaglio.html?stanza=${stanzaId}`;
        }

        let clientMQTT;
        try {
            clientMQTT = mqtt.connect("wss://broker.hivemq.com:8884/mqtt", { clientId: "webapp_home_" + Math.random().toString(16).substring(2, 10), clean: true });
        } catch(e) { console.warn("MQTT non avviato"); }

        if(clientMQTT) {
            clientMQTT.on('connect', function () {
                clientMQTT.subscribe("vincenzo_clima_segreto_7788/status");
                Object.keys(window.stanzeState).forEach(id => subscribeStanzaMQTT(id, window.stanzeState[id].topic));
            });
        }

        function subscribeStanzaMQTT(id, topic) {
            if (clientMQTT && clientMQTT.connected) {
                clientMQTT.subscribe(`vincenzo_clima_segreto_7788/climate/${topic}/mode/state`);
                clientMQTT.subscribe(`vincenzo_clima_segreto_7788/climate/${topic}/target_temperature/state`);
                if (id !== 'cameretta') clientMQTT.subscribe(`vincenzo_clima_segreto_7788/${id}/status`);
            }
        }

        const docRef = doc(db, "impostazioni", "stanze_config");
        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                window.stanzeRawConfig = docSnap.data();
                const grid = document.getElementById('device-grid');
                grid.innerHTML = '';
                
                const sortedRooms = Object.entries(window.stanzeRawConfig).map(([id, data]) => ({ id, ...data }));
                sortedRooms.forEach((r, idx) => { if(r.ordine === undefined) r.ordine = idx; });
                sortedRooms.sort((a, b) => a.ordine - b.ordine);
                
                sortedRooms.forEach((room) => {
                    const id = room.id;
                    if(!window.stanzeState[id]) {
                        window.stanzeState[id] = { online: false, mode: "off", temp: 24, topic: room.topic, icon: room.icon, nome: room.nome };
                        subscribeStanzaMQTT(id, room.topic);
                    } else {
                        window.stanzeState[id].nome = room.nome;
                        window.stanzeState[id].icon = room.icon;
                        window.stanzeState[id].topic = room.topic;
                    }

                    const cardHTML = `
                    <div class="smart-card" id="card-${id}" data-id="${id}" draggable="true" onclick="apriDettagli('${id}')">
                        <div class="card-top">
                            <div class="icon-box" id="icon-box-${id}"><i class="fas ${room.icon}" id="icon-${id}"></i></div>
                            <div class="power-toggle" id="btn-power-${id}" onclick="event.stopPropagation(); togglePowerHome('${id}')">
                                <i class="fas fa-power-off"></i>
                            </div>
                        </div>
                        <div class="card-bottom">
                            <h4 class="card-title">${room.nome}</h4>
                            <p class="card-status" id="status-text-${id}">Connessione...</p>
                            <div class="connection-status"><span class="status-dot" id="dot-${id}"></span><span id="badge-${id}">Offline</span></div>
                        </div>
                        <div class="wifi-indicator"><i class="fas fa-wifi" id="wifi-icon-${id}"></i></div>
                    </div>`;
                    grid.insertAdjacentHTML('beforeend', cardHTML);
                    window.aggiornaUIStanza(id);
                    window.updateRoomStatusDOM(id);
                });
                
                initDragAndDropLogic(); 
            } else {
                const defaultStanze = {
                    cameretta: { nome: "Cameretta", icon: "fa-rocket", topic: "haier_tundra_cameretta", ordine: 0 },
                    soggiorno: { nome: "Soggiorno", icon: "fa-couch", topic: "haier_tundra_soggiorno", ordine: 1 },
                    cucina: { nome: "Cucina", icon: "fa-utensils", topic: "haier_tundra_cucina", ordine: 2 },
                    camera: { nome: "Camera da letto", icon: "fa-bed", topic: "haier_tundra_camera", ordine: 3 }
                };
                setDoc(docRef, defaultStanze);
            }
        });

        function initDragAndDropLogic() {
            const cards = document.querySelectorAll('.smart-card');
            const grid = document.getElementById('device-grid');
            
            cards.forEach(card => {
                card.addEventListener('dragstart', () => { window.isDragging = true; card.classList.add('dragging'); });
                card.addEventListener('dragend', () => {
                    card.classList.remove('dragging');
                    salvaNuovoOrdineCloud();
                    setTimeout(() => window.isDragging = false, 100); 
                });

                let touchTimer;
                card.addEventListener('touchstart', (e) => {
                    touchTimer = setTimeout(() => {
                        window.isDragging = true; 
                        card.classList.add('dragging');
                    }, 350); 
                });

                card.addEventListener('touchmove', (e) => {
                    if (!card.classList.contains('dragging')) { clearTimeout(touchTimer); return; }
                    e.preventDefault();
                    const touch = e.touches[0];
                    const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
                    const currentCardOver = targetEl ? targetEl.closest('.smart-card') : null;
                    
                    if (currentCardOver && currentCardOver !== card) {
                        const allCards = [...grid.querySelectorAll('.smart-card:not(.dragging)')];
                        const nextEl = allCards.find(c => {
                            const box = c.getBoundingClientRect();
                            return touch.clientY < box.top + box.height / 2 && touch.clientX < box.left + box.width / 2;
                        });
                        grid.insertBefore(card, nextEl);
                    }
                });

                card.addEventListener('touchend', () => {
                    clearTimeout(touchTimer);
                    if (card.classList.contains('dragging')) {
                        card.classList.remove('dragging');
                        salvaNuovoOrdineCloud();
                        setTimeout(() => window.isDragging = false, 100);
                    }
                });
            });

            grid.addEventListener('dragover', (e) => {
                e.preventDefault();
                const draggingCard = grid.querySelector('.dragging');
                const siblings = [...grid.querySelectorAll('.smart-card:not(.dragging)')];
                let nextSibling = siblings.find(sibling => {
                    const box = sibling.getBoundingClientRect();
                    return e.clientY < box.top + box.height / 2 && e.clientX < box.left + box.width / 2;
                });
                grid.insertBefore(draggingCard, nextSibling);
            });
        }

        function salvaNuovoOrdineCloud() {
            const currentCards = [...document.querySelectorAll('.smart-card')];
            let modificato = false;
            
            currentCards.forEach((card, index) => {
                const id = card.getAttribute('data-id');
                if (window.stanzeRawConfig[id] && window.stanzeRawConfig[id].ordine !== index) {
                    window.stanzeRawConfig[id].ordine = index;
                    modificato = true;
                }
            });

            if (modificato) setDoc(docRef, window.stanzeRawConfig);
        }

        window.updateRoomStatusDOM = function(id) {
            const s = window.stanzeState[id]; if (!s) return;
            const badge = document.getElementById(`badge-${id}`); const dot = document.getElementById(`dot-${id}`);
            if(badge) badge.innerText = s.online ? "Online" : "Offline";
            if(dot) dot.className = s.online ? "status-dot online" : "status-dot";
            window.aggiornaUIStanza(id);
        }

        if(clientMQTT) {
            clientMQTT.on('message', function (topic, message) {
                const payload = message.toString().toLowerCase();
                if (topic === "vincenzo_clima_segreto_7788/status") {
                    if (window.stanzeState.cameretta) { window.stanzeState.cameretta.online = (payload === "online"); window.updateRoomStatusDOM('cameretta'); }
                }
                Object.keys(window.stanzeState).forEach(id => {
                    if (topic === `vincenzo_clima_segreto_7788/${id}/status`) { window.stanzeState[id].online = (payload === "online"); window.updateRoomStatusDOM(id); }
                    const top = window.stanzeState[id].topic;
                    if (topic.includes(`${top}/mode/state`)) { window.stanzeState[id].mode = payload; window.aggiornaUIStanza(id); }
                    if (topic.includes(`${top}/target_temperature/state`)) { const t = parseFloat(payload); if(!isNaN(t)) window.stanzeState[id].temp = t; window.aggiornaUIStanza(id); }
                });
            });
        }

        window.aggiornaUIStanza = function(id) {
            const card = document.getElementById(`card-${id}`); if(!card) return;
            const testo = document.getElementById(`status-text-${id}`); const icona = document.getElementById(`icon-${id}`);
            const s = window.stanzeState[id];
            if (s.mode === "off") { 
                card.classList.remove('is-on'); testo.innerText = "Spento"; icona.className = `fas ${s.icon}`;
            } else {
                card.classList.add('is-on');
                let modeIta = "Fresco"; let color = "#007aff"; let bg = "#e5f1ff"; let iconClass = "fas fa-snowflake";
                if(s.mode === "heat") { modeIta = "Caldo"; color = "#ff3b30"; bg = "#ffebe9"; iconClass = "fas fa-sun"; }
                if(s.mode === "dry") { modeIta = "Deumid."; color = "#5ac8fa"; bg = "#eef9ff"; iconClass = "fas fa-tint"; }
                if(s.mode === "fan_only") { modeIta = "Ventola"; color = "#8e8e93"; bg = "#f2f2f7"; iconClass = "fas fa-fan"; }
                if(s.mode === "auto") { modeIta = "Auto"; color = "#34c759"; bg = "#ebf9ee"; iconClass = "fas fa-magic"; }
                card.style.setProperty('--accent-color', color); card.style.setProperty('--accent-bg', bg);
                icona.className = iconClass; testo.innerText = `${modeIta} • ${s.temp}°C`;
            }
            const wifiIcon = document.getElementById(`wifi-icon-${id}`);
            if(wifiIcon) wifiIcon.style.color = s.online ? 'var(--success-color)' : '#d1d1d6';
        }

        window.togglePowerHome = function(id) {
            const s = window.stanzeState[id]; if(!s) return; if(!s.online) { alert("Il condizionatore è Offline!"); return; }
            if(clientMQTT && clientMQTT.connected) {
                clientMQTT.publish(`vincenzo_clima_segreto_7788/climate/${s.topic}/mode/command`, (s.mode === "off") ? "cool" : "off");
            }
        };
    </script>

<script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('Service Worker registrato con successo', reg);
                }).catch(err => {
                    console.warn('Errore Service Worker', err);
                });
            });
        }
    </script>
