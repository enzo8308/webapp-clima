<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dettaglio Climatizzatore</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #f5f6f8; --card-bg: #ffffff; --text-main: #333333; --text-muted: #888888; --accent-color: #007bff; --accent-light: #e6f2ff; }
        body { margin: 0; padding: 0; font-family: 'Roboto', sans-serif; background-color: var(--bg-color); color: var(--text-main); padding-bottom: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background-color: var(--card-bg); position: sticky; top: 0; z-index: 100; }
        .back-btn { color: var(--text-main); text-decoration: none; font-size: 20px; cursor: pointer; }
        .main-status { text-align: center; padding: 30px 20px; background-color: var(--card-bg); margin-bottom: 15px; }
        .temperature-display { font-size: 64px; font-weight: 700; color: var(--accent-color); margin: 10px 0; display: flex; justify-content: center; }
        .power-big-btn { width: 60px; height: 60px; border-radius: 50%; background-color: var(--accent-color); color: white; border: none; cursor: pointer; }
        .power-big-btn.off { background-color: #e2e3e5; color: #6c757d; }
        .control-section { background-color: var(--card-bg); margin: 0 15px 15px 15px; padding: 15px; border-radius: 12px; }
        .section-header { font-size: 14px; font-weight: 500; color: var(--text-muted); margin-bottom: 15px; text-transform: uppercase; }
        .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); gap: 10px; }
        .control-btn { background-color: var(--bg-color); border: 1px solid transparent; border-radius: 8px; padding: 12px 5px; display: flex; flex-direction: column; align-items: center; color: var(--text-main); cursor: pointer; }
        .control-btn.active { background-color: var(--accent-light); border-color: var(--accent-color); color: var(--accent-color); }
        .temp-controls { display: flex; justify-content: space-between; align-items: center; background-color: var(--bg-color); border-radius: 12px; padding: 10px; }
        .temp-btn { width: 40px; height: 40px; border-radius: 8px; background-color: white; border: 1px solid #ddd; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
        <h1>Cameretta</h1>
    </div>
    <div class="main-status">
        <div id="main-mode-text">FREDDO</div>
        <div class="temperature-display"><span id="temp-display-main">24</span><span>°C</span></div>
        <button class="power-big-btn" id="power-btn" onclick="toggleAccensione()"><i class="fas fa-power-off"></i></button>
    </div>
    <div class="control-section">
        <div class="section-header">Modalità</div>
        <div class="btn-grid" id="mode-buttons">
            <div class="control-btn" onclick="cambiaModalita('Caldo', this)">Caldo</div>
            <div class="control-btn" onclick="cambiaModalita('Freddo', this)">Freddo</div>
        </div>
    </div>
    <div class="control-section">
        <div class="section-header">Temperatura</div>
        <div class="temp-controls">
            <button class="temp-btn" onclick="cambiaTemperatura(-1)"><i class="fas fa-minus"></i></button>
            <span id="temp-display-control">24 °C</span>
            <button class="temp-btn" onclick="cambiaTemperatura(1)"><i class="fas fa-plus"></i></button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.2.2/mqtt.min.js"></script>
    <script>
        const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");
        const baseTopic = "vincenzo_clima_segreto_7788/climate/haier_tundra_cameretta";
        let gradiAttuali = 24;

        client.on('connect', () => {
            console.log("Connesso!");
            client.subscribe(baseTopic + "/mode/state");
            client.subscribe(baseTopic + "/target_temperature/state");
        });

        client.on('message', (topic, message) => {
            const payload = message.toString().toLowerCase();
            if(topic.includes("mode")) {
                document.getElementById('main-mode-text').innerText = payload.toUpperCase();
            } else if(topic.includes("target")) {
                gradiAttuali = parseInt(payload);
                document.getElementById('temp-display-main').innerText = gradiAttuali;
                document.getElementById('temp-display-control').innerText = gradiAttuali + " °C";
            }
        });

        function invia(topic, msg) { client.publish(topic, msg); }
        window.toggleAccensione = () => invia(baseTopic + "/mode/command", "COOL");
        window.cambiaModalita = (m, el) => invia(baseTopic + "/mode/command", m.toUpperCase());
        window.cambiaTemperatura = (d) => { gradiAttuali += d; invia(baseTopic + "/target_temperature/command", gradiAttuali.toString()); };
    </script>
</body>
</html>
