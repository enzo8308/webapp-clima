<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dettaglio Clima</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-color: #f0f5fa; 
            --card-bg: #ffffff; 
            --text-main: #1c1c1e; 
            --text-muted: #8e8e93; 
            --accent-color: #007aff; /* Blu (Freddo) di default */
            --accent-bg: #e5f1ff; 
        }
        body { margin: 0; padding: 0; font-family: 'Roboto', sans-serif; background-color: var(--bg-color); color: var(--text-main); user-select: none; -webkit-user-select: none; }
        
        /* HEADER CON TASTO INDIETRO */
        .header { display: flex; align-items: center; padding: 30px 24px 15px 24px; gap: 15px; }
        .back-btn { width: 40px; height: 40px; border-radius: 20px; background: var(--card-bg); display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text-main); box-shadow: 0 4px 15px rgba(0,0,0,0.03); cursor: pointer; text-decoration: none; transition: 0.2s; }
        .back-btn:active { transform: scale(0.9); }
        .greeting-box { display: flex; flex-direction: column; gap: 2px; }
        .greeting { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; margin: 0; }
        .subtitle { font-size: 13px; font-weight: 500; color: var(--text-muted); margin: 0; display: flex; align-items: center; gap: 5px;}
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff3b30; }
        .status-dot.online { background: #34c759; box-shadow: 0 0 6px rgba(52, 199, 89, 0.5); }

        /* SCHERMO TEMPERATURA CIRCOLARE */
        .temp-display-container { display: flex; justify-content: center; align-items: center; margin: 30px 0; }
        .temp-circle { width: 240px; height: 240px; border-radius: 50%; background: var(--card-bg); box-shadow: 0 10px 40px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: center; align-items: center; border: 8px solid var(--accent-bg); transition: border-color 0.4s; position: relative; }
        .temp-value { font-size: 64px; font-weight: 900; color: var(--text-main); letter-spacing: -2px; margin-left: 10px; }
        .temp-unit { font-size: 24px; font-weight: 700; color: var(--text-muted); position: absolute; top: 65px; right: 50px; }
        .temp-label { font-size: 14px; font-weight: 700; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; transition: color 0.4s;}

        /* CONTROLLI +/- */
        .temp-controls { display: flex; justify-content: center; gap: 30px; margin-bottom: 40px; }
        .btn-temp { width: 60px; height: 60px; border-radius: 30px; background: var(--card-bg); border: none; font-size: 24px; color: var(--text-main); box-shadow: 0 6px 20px rgba(0,0,0,0.04); cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-temp:active { transform: scale(0.9); background: #f8f9fa; }

        /* GRIGLIA MODALITA' */
        .section-title { font-size: 16px; font-weight: 700; margin: 0 24px 15px 24px; color: var(--text-main); }
        .modes-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 0 24px; margin-bottom: 30px; }
        .mode-btn { background: var(--card-bg); border-radius: 20px; padding: 15px 0; display: flex; flex-direction: column; align-items: center; gap: 8px; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.02); transition: 0.3s; }
        .mode-btn i { font-size: 22px; color: var(--text-muted); transition: 0.3s;}
        .mode-btn span { font-size: 11px; font-weight: 700; color: var(--text-muted); transition: 0.3s;}
        
        /* Modalità Attive */
        .mode-btn.active-cool { background: #007aff; } .mode-btn.active-cool i, .mode-btn.active-cool span { color: white; }
        .mode-btn.active-heat { background: #ff3b30; } .mode-btn.active-heat i, .mode-btn.active-heat span { color: white; }
        .mode-btn.active-dry { background: #5ac8fa; } .mode-btn.active-dry i, .mode-btn.active-dry span { color: white; }
        .mode-btn.active-fan { background: #8e8e93; } .mode-btn.active-fan i, .mode-btn.active-fan span { color: white; }

        /* TASTO POWER GIGANTE */
        .power-container { padding: 0 24px 40px 24px; }
        .btn-power-main { width: 100%; padding: 18px; border-radius: 20px; border: none; font-size: 16px; font-weight: 700; color: white; background: #c7c7cc; box-shadow: 0 8px 20px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; font-family: 'Roboto', sans-serif;}
        .btn-power-main.is-on { background: var(--accent-color); box-shadow: 0 8px 25px rgba(0, 122, 255, 0.4); }
        .btn-power-main:active { transform: scale(0.97); }

        /* SCHERMATA DI CARICAMENTO INIZIALE */
        #loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg-color); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); border-left-color: #007aff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div style="font-weight: 700; color: var(--text-muted);">Sincronizzazione Cloud...</div>
    </div>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
        <div class="greeting-box">
            <h1 class="greeting" id="room-title">Condizionatore</h1>
            <p class="subtitle"><span class="status-dot" id="room-dot"></span> <span id="room-status-text">Connessione...</span></p>
        </div>
    </div>

    <div class="temp-display-container">
        <div class="temp-circle" id="circle-bg">
            <div style="position: relative;">
                <span class="temp-value" id="temp-val">24</span>
                <span class="temp-unit">°C</span>
            </div>
            <div class="temp-label" id="mode-label">SPENTO</div>
        </div>
    </div>

    <div class="temp-controls">
        <button class="btn-temp" onclick="changeTemp(-1)"><i class="fas fa-minus"></i></button>
        <button class="btn-temp" onclick="changeTemp(1)"><i class="fas fa-plus"></i></button>
    </div>

    <h2 class="section-title">Modalità</h2>
    <div class="modes-grid">
        <button class="mode-btn" id="btn-cool" onclick="setMode('cool')">
            <i class="fas fa-snowflake"></i><span>Fresco</span>
        </button>
        <button class="mode-btn" id="btn-heat" onclick="setMode('heat')">
            <i class="fas fa-sun"></i><span>Caldo</span>
        </button>
        <button class="mode-btn" id="btn-dry" onclick="setMode('dry')">
            <i class="fas fa-tint"></i><span>Deumid.</span>
        </button>
        <button class="mode-btn" id="btn-fan" onclick="setMode('fan_only')">
            <i class="fas fa-fan"></i><span>Ventola</span>
        </button>
    </div>

    <div class="power-container">
        <button class="btn-power-main" id="btn-main-power" onclick="togglePower()">
            <i class="fas fa-power-off"></i> <span id="power-text">Accendi</span>
        </button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.2.2/mqtt.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyDicCAPn-jBqZzX5SWvxFkTyjeO5VItxUo", authDomain: "smartclima-casa.firebaseapp.com", projectId: "smartclima-casa", storageBucket: "smartclima-casa.firebasestorage.app", messagingSenderId: "1075389846823", appId: "1:1075389846823:web:02fbdc2d55fdbddde84502" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 1. LEGGI L'INDIRIZZO (Es: ?stanza=soggiorno)
        const urlParams = new URLSearchParams(window.location.search);
        const stanzaIdUrl = urlParams.get('stanza') || 'cameretta'; // Fallback di sicurezza

        let topicMQTT = ""; // Lo riempiremo da Firebase
        let isOnline = false;
        let currentMode = "off";
        let currentTemp = 24;

        const clientMQTT = mqtt.connect("wss://broker.hivemq.com:8884/mqtt", { clientId: "webapp_det_" + Math.random().toString(16).substring(2, 10), clean: true });

        // Controllo Login
        onAuthStateChanged(auth, (user) => { 
            if (!user) window.location.href = "login.html"; 
            else inizializzaPagina();
        });

        function inizializzaPagina() {
            // 2. CHIEDI A FIREBASE IL VERO NOME E IL TOPIC
            const docRef = doc(db, "impostazioni", "stanze_config");
            getDoc(docRef).then((docSnap) => {
                if (docSnap.exists()) {
                    const dbStanze = docSnap.data();
                    const configStanza = dbStanze[stanzaIdUrl];
                    
                    if(configStanza) {
                        // Aggiorna la UI con il nome reale
                        document.getElementById('room-title').innerText = configStanza.nome;
                        topicMQTT = configStanza.topic;

                        // 3. ORA CHE SO IL TOPIC, MI ISCRIVO A MQTT
                        connettiMQTT();
                        
                        // Nascondi caricamento
                        setTimeout(() => {
                            document.getElementById('loading-overlay').style.opacity = '0';
                            setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 500);
                        }, 500);
                    } else {
                        alert("Stanza non trovata nel database!");
                        window.location.href = "index.html";
                    }
                }
            });
        }

        function connettiMQTT() {
            if(clientMQTT.connected) iscrizioni();
            else clientMQTT.on('connect', iscrizioni);
        }

        function iscrizioni() {
            // Ascolta lo stato online specifico
            if (stanzaIdUrl === 'cameretta') {
                clientMQTT.subscribe("vincenzo_clima_segreto_7788/status");
            } else {
                clientMQTT.subscribe(`vincenzo_clima_segreto_7788/${stanzaIdUrl}/status`);
            }
            // Ascolta comandi
            clientMQTT.subscribe(`vincenzo_clima_segreto_7788/climate/${topicMQTT}/mode/state`);
            clientMQTT.subscribe(`vincenzo_clima_segreto_7788/climate/${topicMQTT}/target_temperature/state`);
        }

        clientMQTT.on('message', function (topic, message) {
            const payload = message.toString().toLowerCase();
            
            // Stato Online
            if (topic.endsWith("/status")) {
                isOnline = (payload === "online");
                document.getElementById('room-status-text').innerText = isOnline ? "Online" : "Offline";
                document.getElementById('room-dot').className = isOnline ? "status-dot online" : "status-dot";
            }
            
            // Mode e Temperatura
            if (topic.includes(`${topicMQTT}/mode/state`)) {
                currentMode = payload;
                aggiornaGrafica();
            }
            if (topic.includes(`${topicMQTT}/target_temperature/state`)) {
                const t = parseFloat(payload);
                if(!isNaN(t)) currentTemp = t;
                aggiornaGrafica();
            }
        });

        // FUNZIONI UI
        function aggiornaGrafica() {
            document.getElementById('temp-val').innerText = currentTemp;
            
            // Reset bottoni e colori
            document.querySelectorAll('.mode-btn').forEach(b => b.className = 'mode-btn');
            const btnMain = document.getElementById('btn-main-power');
            const label = document.getElementById('mode-label');
            const root = document.documentElement;

            if(currentMode === "off") {
                btnMain.className = "btn-power-main";
                btnMain.innerHTML = '<i class="fas fa-power-off"></i> <span id="power-text">Accendi</span>';
                label.innerText = "SPENTO";
                label.style.color = "var(--text-muted)";
                root.style.setProperty('--accent-bg', '#f0f5fa');
            } else {
                btnMain.className = "btn-power-main is-on";
                btnMain.innerHTML = '<i class="fas fa-power-off"></i> <span id="power-text">Spegni</span>';
                
                if(currentMode === "cool") { 
                    document.getElementById('btn-cool').classList.add('active-cool');
                    label.innerText = "FRESCO"; label.style.color = "#007aff";
                    root.style.setProperty('--accent-color', '#007aff'); root.style.setProperty('--accent-bg', '#e5f1ff');
                }
                else if(currentMode === "heat") { 
                    document.getElementById('btn-heat').classList.add('active-heat');
                    label.innerText = "CALDO"; label.style.color = "#ff3b30";
                    root.style.setProperty('--accent-color', '#ff3b30'); root.style.setProperty('--accent-bg', '#ffebe9');
                }
                else if(currentMode === "dry") { 
                    document.getElementById('btn-dry').classList.add('active-dry');
                    label.innerText = "DEUMIDIFICATORE"; label.style.color = "#5ac8fa";
                    root.style.setProperty('--accent-color', '#5ac8fa'); root.style.setProperty('--accent-bg', '#eef9ff');
                }
                else if(currentMode === "fan_only") { 
                    document.getElementById('btn-fan').classList.add('active-fan');
                    label.innerText = "VENTOLA"; label.style.color = "#8e8e93";
                    root.style.setProperty('--accent-color', '#8e8e93'); root.style.setProperty('--accent-bg', '#f2f2f7');
                }
            }
        }

        // COMANDI IN USCITA
        window.togglePower = function() {
            if(!isOnline) { alert("Condizionatore offline!"); return; }
            const nextMode = (currentMode === "off") ? "cool" : "off";
            clientMQTT.publish(`vincenzo_clima_segreto_7788/climate/${topicMQTT}/mode/command`, nextMode);
        };

        window.setMode = function(mode) {
            if(!isOnline) { alert("Condizionatore offline!"); return; }
            // Se clicco la modalità già attiva, spegne
            if(currentMode === mode) window.togglePower();
            else clientMQTT.publish(`vincenzo_clima_segreto_7788/climate/${topicMQTT}/mode/command`, mode);
        };

        window.changeTemp = function(delta) {
            if(!isOnline) { alert("Condizionatore offline!"); return; }
            if(currentMode === "off") { alert("Accendi prima il clima!"); return; }
            
            let newTemp = currentTemp + delta;
            if(newTemp < 16) newTemp = 16;
            if(newTemp > 30) newTemp = 30;
            
            // Aggiorna subito la UI visiva per reattività, poi manda al server
            currentTemp = newTemp;
            document.getElementById('temp-val').innerText = currentTemp;
            clientMQTT.publish(`vincenzo_clima_segreto_7788/climate/${topicMQTT}/target_temperature/command`, newTemp.toString());
        };
    </script>
</body>
</html>
